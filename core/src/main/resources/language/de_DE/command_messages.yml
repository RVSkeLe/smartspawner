  scan_none:
    message: "&#ff5252✗ ᴋᴇɪɴᴇ ꜱᴘᴀᴡɴᴇʀ ɪɴɴᴇʀʜᴀʟʙ ᴠᴏɴ &#f8f8ff{radius} &#ff5252ʙʟöᴄᴋᴇɴ ɢᴇꜰᴜɴᴅᴇɴ."
    sound: block.note_block.pling
  scan_cancelled:
    message: "&#f1c40f⊘ ꜱᴄᴀɴ ᴀʙɢᴇʙʀᴏᴄʜᴇɴ & ᴍᴀʀᴋɪᴇʀᴜɴɢᴇɴ ᴇɴᴛꜰᴇʀɴᴛ."
    sound: block.note_block.bass
  no_active_scan:
    message: "&#ff5252ᴋᴇɪɴ ᴀᴋᴛɪᴠᴇʀ ꜱᴄᴀɴ ᴢᴜᴍ ᴀʙʙʀᴇᴄʜᴇɴ."
    sound: block.note_block.bass
  highlights_expired:
    message: "&#888888⏱ ꜱᴘᴀᴡɴᴇʀ-ᴍᴀʀᴋɪᴇʀᴜɴɢᴇɴ ꜱɪɴᴅ ᴠᴇʀꜰᴀʟʟᴇɴ."

