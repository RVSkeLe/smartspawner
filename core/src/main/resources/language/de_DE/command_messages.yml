  bossbar:
    analyzing: "🔍 ᴀɴᴀʟʏꜱɪᴇʀᴇ... {percent}%"
    found: "✓ {count} ꜱᴘᴀᴡɴᴇʀ ɪɴɴᴇʀʜᴀʟʙ ᴠᴏɴ {radius} ʙʟöᴄᴋᴇɴ ɢᴇꜰᴜɴᴅᴇɴ"
    not_found: "✗ ᴋᴇɪɴᴇ ꜱᴘᴀᴡɴᴇʀ ɪɴɴᴇʀʜᴀʟʙ ᴠᴏɴ {radius} ʙʟöᴄᴋᴇɴ"
