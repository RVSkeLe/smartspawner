    button: "[ɪᴍ ɢᴜɪ ᴀɴᴢᴇɪɢᴇɴ]"
    hover: "Klicke, um {count} Spawner in der Nähe zu durchsuchen"
  scan_start:
    message: "&#3498db🔍 ꜱᴜᴄʜᴇ ɴᴀᴄʜ ꜱᴘᴀᴡɴᴇʀɴ ɪɴ &#f8f8ff{radius} &#3498dbʙʟöᴄᴋᴇɴ…"
    sound: block.note_block.hat
  scan_found:
    message: "&#37eb9a✓ &#f8f8ff{count} &#37eb9aꜱᴘᴀᴡɴᴇʀ ɪɴɴᴇʀʜᴀʟʙ ᴠᴏɴ &#f8f8ff{radius} &#37eb9aʙʟöᴄᴋᴇɴ ɢᴇꜰᴜɴᴅᴇɴ. &#f1c40fᴍᴀʀᴋɪᴇʀᴜɴɢ &#f8f8ff30ꜱ&#f1c40f ꜱɪᴄʜᴛʙᴀʀ."
