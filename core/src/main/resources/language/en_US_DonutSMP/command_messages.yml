# SmartSpawner – command_messages.yml
# Messages related to plugin commands, including usage instructions and error messages.

player_only:
  message: "&#ff5252ᴛʜɪꜱ ᴄᴏᴍᴍᴀɴᴅ ᴄᴀɴ ᴏɴʟʏ ʙᴇ ᴜꜱᴇᴅ ʙʏ ᴘʟᴀʏᴇʀꜱ."
  sound: block.note_block.bass

no_permission:
  message: "&#ff5252ʏᴏᴜ ᴅᴏɴᴛ ʜᴀᴠᴇ ᴘᴇʀᴍɪꜱꜱɪᴏɴ ᴛᴏ ᴅᴏ ᴛʜɪꜱ"
  sound: block.note_block.pling

# ──────────────────────────────────────────────────────
#                        /ss set
# ──────────────────────────────────────────────────────
set:
  usage:
    message: "&#ff5252Usage: &#f8f8ff/ss set <stack_size|range|delay> <value> [world x y z]"
    sound: block.note_block.hat
  invalid:
    message: "&#ff5252Invalid value or SmartSpawner location."
    sound: block.note_block.pling
  stack_size_exceeds_max:
    message: "&#ff5252Stack size &#f8f8ff{value} &#ff5252exceeds this spawner's max stack size: &#f8f8ff{max}"
    sound: block.note_block.pling
  location_required:
    message: "&#ff5252Console must provide a location: &#f8f8ff/ss set <stack_size|range|delay> <value> <world> <x> <y> <z>"
    sound: block.note_block.pling
  success:
    message: "&#37eb9aSet &#f8f8ff{property} &#37eb9afrom &#f8f8ff{old_value} &#37eb9ato &#f8f8ff{new_value} &#37eb9aat &#f8f8ff{world} {x} {y} {z}&#37eb9a."
    sound: entity.experience_orb.pickup

# ──────────────────────────────────────────────────────
#                        /ss near
# ──────────────────────────────────────────────────────
