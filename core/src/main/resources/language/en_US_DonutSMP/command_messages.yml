  scan_cancelled:
    message: "&#f1c40f⊘ ꜱᴄᴀɴ ᴄᴀɴᴄᴇʟʟᴇᴅ & ʜɪɢʜʟɪɢʜᴛꜱ ʀᴇᴍᴏᴠᴇᴅ."
